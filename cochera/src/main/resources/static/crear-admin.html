<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cochera — Crear administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--asfalto:#1b1d1c;--asfalto2:#262927;--linea:#3a3e3b;--senal:#f2c200;--alto:#e2473b;--ok:#3fa66b;--tiza:#e8e6e0;--gris:#8f938d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--asfalto);color:var(--tiza);font-family:'IBM Plex Sans',sans-serif;
 background-image:repeating-linear-gradient(90deg,transparent 0 78px,rgba(255,255,255,.02) 78px 80px)}
header{border-bottom:3px solid var(--senal);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
h1{font-family:'Archivo Black',sans-serif;font-size:20px}h1 span{color:var(--senal)}
a.link{color:var(--senal);font-family:'IBM Plex Mono',monospace;font-size:12px;text-decoration:none;border-bottom:1px solid var(--linea)}
main{max-width:560px;margin:0 auto;padding:28px 22px 60px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--gris);margin-bottom:12px}
form{background:var(--asfalto2);padding:22px}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--gris);margin:14px 0 5px}
label:first-child{margin-top:0}
input{width:100%;background:var(--asfalto);border:1px solid var(--linea);color:var(--tiza);padding:11px;
 font-family:'IBM Plex Mono',monospace;font-size:14px}
input:focus{outline:2px solid var(--senal);outline-offset:1px}
.fila{display:flex;gap:12px}.fila>div{flex:1}
.btn{margin-top:22px;width:100%;background:var(--senal);border:none;color:#111;padding:14px;
 font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:.05em;cursor:pointer}
.btn:disabled{background:var(--linea);color:var(--gris);cursor:not-allowed}
.msg{margin-top:16px;padding:11px;font-size:13px;border-left:3px solid;display:none}
.msg.ok{border-color:var(--ok);background:rgba(63,166,107,.1);display:block}
.msg.err{border-color:var(--alto);background:rgba(226,71,59,.1);display:block}
.nota{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gris);margin-top:14px}
</style>
</head>
<body>
<header>
  <h1>CREAR <span>ADMINISTRADOR</span></h1>
  <a class="link" href="admin.html">← Volver al panel</a>
</header>

<main>
  <p class="eyebrow">DATOS DEL NUEVO ADMINISTRADOR (MÁXIMO 3)</p>
  <form id="frmAdmin">
    <label for="aNombre">NOMBRE</label>
    <input id="aNombre" required placeholder="Ana Torres">

    <div class="fila">
      <div>
        <label for="aDni">DNI</label>
        <input id="aDni" required pattern="\d{8}" title="8 dígitos" placeholder="70112458">
      </div>
      <div>
        <label for="aCelular">CELULAR</label>
        <input id="aCelular" required pattern="\d{9}" title="9 dígitos" placeholder="912345678">
      </div>
    </div>

    <label for="aCorreo">CORREO</label>
    <input id="aCorreo" type="email" required placeholder="ana@mail.com">

    <label for="aPassword">CONTRASEÑA</label>
    <input id="aPassword" type="password" required minlength="4" placeholder="mínimo 4 caracteres">

    <button class="btn" id="btnAdmin" type="submit">CREAR ADMIN</button>
    <div class="msg" id="msgAdmin"></div>
    <p class="nota">Solo puede haber 3 administradores como máximo.</p>
  </form>
</main>

<script src="js/error-modal.js"></script>
<script>
const token = localStorage.getItem('admin_token');
if (!token) location.href = 'admin-login.html';

frmAdmin.onsubmit = async e => {
  e.preventDefault();
  msgAdmin.style.display = 'none';
  btnAdmin.disabled = true;
  const body = {
    nombre: aNombre.value.trim(), dni: aDni.value.trim(), celular: aCelular.value.trim(),
    correo: aCorreo.value.trim(), password: aPassword.value
  };
  try{
    const r = await fetch('http://localhost:8080/api/auth/crear-admin', {
      method:'POST', headers:{'Content-Type':'application/json', Authorization:'Bearer '+token}, body: JSON.stringify(body)
    });
    if (r.status === 401 || r.status === 403) { location.href = 'admin-login.html'; return; }
    const d = await r.json();
    msgAdmin.className = 'msg ' + (r.ok ? 'ok' : 'err');
    msgAdmin.textContent = r.ok ? 'Administrador "' + d.nombre + '" creado correctamente.' : d.error;
    msgAdmin.style.display = 'block';
    if (r.ok) { frmAdmin.reset(); aNombre.focus(); }
  }catch(err){
    if (typeof showErrorModal === 'function') showErrorModal(null, () => frmAdmin.requestSubmit());
    else { msgAdmin.className='msg err'; msgAdmin.textContent='Sin conexión con el servidor.'; msgAdmin.style.display='block'; }
  }
  btnAdmin.disabled = false;
};
</script>
</body>
</html>
